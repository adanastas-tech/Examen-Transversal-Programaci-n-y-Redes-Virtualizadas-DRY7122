---
- name: Instalar y configurar servidor web Apache
  hosts: localhost
  connection: local
  become: true # Permite ejecutar tareas con privilegios de administrador (sudo)
  
  tasks:
    - name: Instalar Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Cambiar el puerto de escucha a 9999
      lineinfile:
        path: /etc/apache2/ports.conf
        regexp: '^Listen '
        line: 'Listen 9999'

    - name: Reiniciar el servicio Apache para aplicar el cambio de puerto
      service:
        name: apache2
        state: restarted